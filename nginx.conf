server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript text/xml image/svg+xml;
    gzip_min_length 256;

    # Hugo generates clean URLs — try the path, then path/index.html, then 404
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Long-lived caching for fingerprinted static assets
    location ~* \.(css|js|svg|png|jpg|jpeg|webp|woff|woff2|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 404 /404.html;
}
