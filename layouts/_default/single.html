{{ define "main" }}
<article class="blog-post">
  <div class="container container--narrow">
    <header class="blog-post__header">
      <time datetime="{{ .Date.Format "2006-01-02" }}" class="blog-post__date">{{ .Date.Format "2 January 2006" }}</time>
      <h1 class="blog-post__title">{{ .Title }}</h1>
      {{ with .Description }}<p class="blog-post__desc">{{ . }}</p>{{ end }}
    </header>
    <div class="blog-post__content">
      {{ .Content }}
    </div>
    <footer class="blog-post__footer">
      <a href="/blog/" class="btn btn--outline">← Back to blog</a>
    </footer>
  </div>
</article>
{{ end }}
